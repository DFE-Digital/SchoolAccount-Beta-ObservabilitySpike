services:
  student-records-api:
    image: student-records-api
    build:
      context: .
      dockerfile: StudentRecords.Api/Dockerfile
    ports:
      - "5040:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      OTEL_SERVICE_NAME: student-records-api
      OTEL_SERVICE_VERSION: spike-b
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=spike-b,deployment.environment=local
    depends_on:
      - otel-collector

  collect-api:
    image: collect-api
    build:
      context: .
      dockerfile: Collect.Api/Dockerfile
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      Downstream__StudentRecordsBaseUrl: http://student-records-api:8080
      Downstream__RubyServiceBaseUrl: http://ruby-service:8080
      OTEL_SERVICE_NAME: collect-api
      OTEL_SERVICE_VERSION: spike-b
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=spike-b,deployment.environment=local
    depends_on:
      - otel-collector
      - student-records-api
      - ruby-service

  ruby-service:
    image: ruby-service
    build:
      context: .
      dockerfile: Ruby.Service/Dockerfile
    ports:
      - "5003:8080"
    environment:
      RACK_ENV: production
      PORT: 8080

      OTEL_SERVICE_NAME: ruby-service
      OTEL_SERVICE_VERSION: spike-b
      OTEL_TRACES_EXPORTER: otlp

      # Ruby OTLP exporter uses HTTP/protobuf, not gRPC.
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318

      OTEL_RESOURCE_ATTRIBUTES: service.namespace=spike-b,deployment.environment=local
    depends_on:
      - otel-collector

  school-account-api:
    image: school-account-api
    build:
      context: .
      dockerfile: SpikeB.Observability.Api/Dockerfile
    ports:
      - "5032:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      Downstream__CollectBaseUrl: http://collect-api:8080
      OTEL_SERVICE_NAME: school-account-api
      OTEL_SERVICE_VERSION: spike-b
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=spike-b,deployment.environment=local
    depends_on:
      - collect-api
      - otel-collector

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command:
      - "--config=/etc/otelcol/config.yaml"
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.6.1
    command:
      - "-config.file=/etc/tempo.yaml"
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - tempo
      - prometheus