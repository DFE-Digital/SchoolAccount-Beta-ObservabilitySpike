services:
  student-records-api:
    image: student-records-api
    build:
      context: .
      dockerfile: StudentRecords.Api/Dockerfile
    ports:
      - "5040:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      OTEL_SERVICE_NAME: student-records-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=spike-b, service.version=spike-b
    depends_on:
      otel-collector:
        condition: service_started

  collect-api:
    image: collect-api
    build:
      context: .
      dockerfile: Collect.Api/Dockerfile
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development

      Downstream__StudentRecordsBaseUrl: http://student-records-api:8080
      Downstream__RubyServiceBaseUrl: http://ruby-service:8080

      ConnectionStrings__CollectSql: Server=sql,1433;Database=master;User Id=sa;Password=Observability!2026;Encrypt=True;TrustServerCertificate=True;Connect Timeout=3

      OTEL_SERVICE_NAME: collect-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=spike-b, service.version=spike-b
    depends_on:
      otel-collector:
        condition: service_started
      student-records-api:
        condition: service_started
      ruby-service:
        condition: service_started
      sql:
        condition: service_healthy

  ruby-service:
    image: ruby-service
    build:
      context: .
      dockerfile: Ruby.Service/Dockerfile
    ports:
      - "5003:8080"
    environment:
      RACK_ENV: production
      PORT: 8080

      OTEL_SERVICE_NAME: ruby-service
      OTEL_TRACES_EXPORTER: otlp

      # Ruby OTLP exporter uses HTTP/protobuf.
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318

      OTEL_RESOURCE_ATTRIBUTES: service.namespace=spike-b, service.version=spike-b
    depends_on:
      otel-collector:
        condition: service_started

  school-account-api:
    image: school-account-api
    build:
      context: .
      dockerfile: SpikeB.Observability.Api/Dockerfile
    ports:
      - "5032:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      Downstream__CollectBaseUrl: http://collect-api:8080

      OTEL_SERVICE_NAME: school-account-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=spike-b,service.version=spike-b,deployment.environment=local,host.name=school-account-api
    depends_on:
      collect-api:
        condition: service_started
      otel-collector:
        condition: service_started

  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: observability-sql
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Observability!2026"
    healthcheck:
      test:
        - CMD-SHELL
        - >
          /opt/mssql-tools18/bin/sqlcmd
          -S localhost
          -U sa
          -P 'Observability!2026'
          -C
          -Q 'SELECT 1'
          || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command:
      - "--config=/etc/otelcol/config.yaml"
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      tempo:
        condition: service_started

  tempo:
    image: grafana/tempo:2.6.1
    command:
      - "-config.file=/etc/tempo.yaml"
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      otel-collector:
        condition: service_started
  
  loki:
    image: grafana/loki:3.5.0
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_FEATURE_TOGGLES_ENABLE: provisioning,kubernetesDashboards
      GF_PATHS_PERMITTED_PROVISIONING_PATHS: dashboards/
      # Removes need to log in
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./dashboards:/usr/share/grafana/dashboards
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
    depends_on:
      tempo:
        condition: service_started
      prometheus:
        condition: service_started
  
  provisioning-setup:
    image: curlimages/curl:8.13.0
    depends_on:
      - grafana
    environment:
      GRAFANA_URL: http://grafana:3000
      GRAFANA_USER: admin
      GRAFANA_PASSWORD: admin
    volumes:
      - ./setup/create-repository.sh:/create-repository.sh:ro
    entrypoint: [ "/bin/sh", "/create-repository.sh" ]
    restart: "no"
    
  traffic:
    image: curlimages/curl:8.13.0
    depends_on:
      - collect-api
    entrypoint:
      - /bin/sh
      - -c
      - |
        i=0
        while true; do
          i=$$((i + 1))
          curl -s http://collect-api:8080/api/collect/normal > /dev/null
          curl -s http://collect-api:8080/api/collect/slow > /dev/null
          curl -s http://collect-api:8080/api/collect/timeout > /dev/null
          if [ $$((i % 5)) = 0 ]; then curl -s http://collect-api:8080/api/collect/error > /dev/null; fi
          sleep 2
        done
    restart: unless-stopped