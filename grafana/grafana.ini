# Extra Grafana config that can't be expressed as environment variables
# (individual feature-toggle keys are only read from the ini file).
# Everything else is configured via GF_* env vars in docker-compose.yml.

[feature_toggles]
# The team-folders section of the folder picker queries the current user's
# teams, which returns "Unauthorized" for the anonymous sessions this stack
# uses. No login means no teams, so turn the feature off.
teamFolders = false
