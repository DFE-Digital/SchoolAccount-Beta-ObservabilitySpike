receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  filelog/ruby:
    include:
      - /var/log/ruby/*.log

    start_at: beginning

    operators:
      - type: add
        field: resource["service.name"]
        value: ruby-service

      - type: add
        field: resource["service.namespace"]
        value: spike-b


connectors:
  span_metrics:
    metrics_flush_interval: 5s

    histogram:
      unit: ms
      explicit:
        buckets:
          - 5ms
          - 10ms
          - 25ms
          - 50ms
          - 100ms
          - 250ms
          - 500ms
          - 1s
          - 2s
          - 5s
          - 10s


exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true

  debug:
    verbosity: detailed


processors:
  resource:
    attributes:
      - key: deployment.environment
        value: local
        action: upsert

  batch: {}


service:
  pipelines:
    traces:
      receivers:
        - otlp
      processors:
        - resource
        - batch
      exporters:
        - otlp/tempo
        - span_metrics
        - debug

    metrics:
      receivers:
        - otlp
        - span_metrics
      processors:
        - resource
        - batch
      exporters:
        - prometheus
        - debug

    logs:
      receivers:
        - otlp
        - filelog/ruby
      processors:
        - resource
        - batch
      exporters:
        - otlphttp/loki
        - debug